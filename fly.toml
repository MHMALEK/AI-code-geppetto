# fly.toml app configuration file generated for geppetto-ai-starlit-lagoon-1664 on 2026-05-05T18:15:31+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'geppetto-ai-starlit-lagoon-1664'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'geppetto_data'
  destination = '/app/data'
  initial_size = '3gb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    interval = '30s'
    timeout = '15s'
    grace_period = '5m'
    method = 'GET'
    path = '/tasks'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
